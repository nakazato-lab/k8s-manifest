# node_db.json を永続化するための PVC 定義
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: manager-db-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-deployment
  namespace: default
  labels:
    app: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager
  template:
    metadata:
      labels:
        app: manager
    spec:
      serviceAccountName: manager-service-account
      
      initContainers:
      - name: wait-for-nfd-ip
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command: 
        - 'sh'
        - '-c'
        - |
          while true; do
            ENDPOINT=$(cat /etc/ndn-config/ADDRESS 2>/dev/null || echo 'not available yet')
            echo "NFD endpoint: $ENDPOINT"
            if [ "$ENDPOINT" != "not available yet" ]; then
              NFD_ADDR=$ENDPOINT
              break
            fi
            sleep 10
          done
          echo "Target NFD IP found: $NFD_ADDR"
          until nc -zvw3 "$NFD_ADDR"; do
            echo "waiting for NFD at $NFD_ADDR..."
            sleep 3
          done
        volumeMounts:
        - name: nfd-endpoint
          mountPath: /etc/ndn-config
          readOnly: true

      containers:
      - name: manager
        image: tmkmzk/ndn-manager:latest
        imagePullPolicy: Always
        volumeMounts:
        - name: nfd-endpoint
          mountPath: /etc/ndn-config
          readOnly: true
        # 💡 DB保存用のマウントパス (Pythonコード内の /data と一致させる)
        - name: manager-db-storage
          mountPath: /data

      volumes:
      - name: nfd-endpoint
        configMap:
          name: nfd-config
          optional: true
      - name: manager-db-storage
        persistentVolumeClaim:
          claimName: manager-db-pvc
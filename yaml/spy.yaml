apiVersion: apps/v1
kind: DaemonSet  #spy-DaemonSet から修正
metadata:
  name: spy-daemonset
  namespace: default
  labels:
    app: spy
spec:
  selector:
    matchLabels:
      app: spy
  template:
    metadata:
      labels:
        app: spy
    spec:
      serviceAccountName: spy-service-account
      
      # =========================================================
      # 1. 初期化コンテナ（NFDのIP取得 ＆ 起動待ち）
      # =========================================================
      initContainers:
      - name: wait-for-nfd-ip
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command: 
        - 'sh'
        - '-c'
        - |
            while true; do
              ENDPOINT=$(cat /etc/ndn-config/ADDRESS 2>/dev/null || echo 'not available yet')
              echo "NFD endpoint: $ENDPOINT"

              if [ "$ENDPOINT" != "not available yet" ]; then
                NFD_ADDR=$ENDPOINT
                break
              fi
              sleep 10
            done
          
            echo "Target NFD IP found: $NFD_ADDR"
          
            until nc -zvw3 "$NFD_ADDR"; do
              echo "waiting for NFD at $NFD_ADDR..."
              sleep 10
            done
        volumeMounts:
        - name: nfd-endpoint
          mountPath: /etc/ndn-config
          readOnly: true
          
      containers:
      - name: spy
        image: <あなたのレジストリ名>/ndn-spy:latest #コンテナイメージを書く、コンテナの中にspy.pyの実行を組み込む
        imagePullPolicy: Always
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: nfd-endpoint
          mountPath: /etc/ndn-config
          readOnly: true
        # ホストノード自体のリソース（CPU/メモリ）を取得するためにマウント
        - name: host-proc
          mountPath: /host/proc
          readOnly: true

      volumes:
      # NFDのIPが格納されているConfigMap
      - name: nfd-endpoint
        configMap:
          name: nfd-config
          optional: true
      # ノード物理マシンのリソース情報を覗くためのホストパス
      - name: host-proc
        hostPath:
          path: /proc
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-manifest
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nakazato-lab/k8s-manifest
    targetRevision: HEAD
    path: yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true     
      selfHeal: true   
    syncOptions:
      - CreateNamespace=true

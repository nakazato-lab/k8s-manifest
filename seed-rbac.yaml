---
# 1. Seed用の特別なアカウント（許可証の持ち主）を作成
apiVersion: v1
kind: ServiceAccount
metadata:
  name: seed-service-account

---
# 2. 「Podを作ったり消したりできる」というルール（権限）を定義
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: seed-pod-manager-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
# 3. アカウントとルールを紐付ける
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: seed-pod-manager-binding
subjects:
  - kind: ServiceAccount
    name: seed-service-account
roleRef:
  kind: Role
  name: seed-pod-manager-role
  apiGroup: rbac.authorization.k8s.io

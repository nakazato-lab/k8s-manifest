apiVersion: apps/v1
kind: DaemonSet  # 💡 spy-DaemonSet から修正
metadata:
  name: spy-daemonset
  namespace: default
  labels:
    app: spy
spec:
  selector:
    matchLabels:
      app: spy
  template:
    metadata:
      labels:
        app: spy
    spec:
      serviceAccountName: spy-service-account
      
      # 💡 メインコンテナが動く前に、指定したNFD（TCP:6363）が立ち上がるのを待つ
      initContainers:
      - name: wait-for-nfd-tcp
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        # nc (netcat) コマンドを使い、NFDのIPとポートに対して疎通が取れるまで2秒おきにチェック
        command: 
        - 'sh'
        - '-c'
        - 'until nc -zvw3 $NFD_IP 6363; do echo "waiting for NFD at $NFD_IP:6363..."; sleep 2; done' # 6363は適宜変更
        env:
        - name: NFD_IP
          # ★ここに「通知されたNFDのIPアドレス」や「NFDのService名」
          value: "nfd-service.ndn.svc.cluster.local"
          
      containers:
      - name: spy
        image: <あなたのレジストリ名>/ndn-spy:latest #コンテナイメージを書く、コンテナの中にspy.pyの実行を組み込む
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: nfd-socket-dir
          mountPath: /var/run/nfd 
      
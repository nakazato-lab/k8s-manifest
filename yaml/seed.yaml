apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: seed-daemonset
  labels:
    app: seed
spec:
  selector:
    matchLabels:
      app: seed
  template:
    metadata:
      labels:
        app: seed
    spec:
      serviceAccountName: seed-service-account
      # nfdеѕ…ж©џз”ЁinitContainers ж¤њиЁЋ
      initContainers:
        - name: wait-for-nfd-ip
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - "sh"
            - "-c"
            - |
              while true; do
                ENDPOINT=$(cat /etc/nfd-config/ADDRESS 2>/dev/null || echo 'not available yet')
                echo "NFD endpoint: $ENDPOINT"

                if [ "$ENDPOINT" != "not available yet" ]; then
                  NFD_ADDR=$ENDPOINT
                  break
                fi
                sleep 10
              done

              echo "Target NFD IP found: $NFD_ADDR"

              until nc -zvw3 "$NFD_ADDR"; do
                echo "waiting for NFD at $NFD_ADDR..."
                sleep 10
              done
          volumeMounts:
            - name: nfd-config
              mountPath: /etc/nfd-config
              readOnly: true
      containers:
        - name: seed
          image: ryotaroiwata/ndn-seed:latest
          imagePullPolicy: Always
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command: ["/bin/bash", "-c"]
          # NFDгЃ®г‚Ѕг‚±гѓѓгѓ€гЃЊгЃ§гЃЌг‚‹гЃѕгЃ§еѕ…ж©џгЃ—гЃ¦гЃ‹г‚‰Seedг‚’иµ·е‹•
          args:
            - |
              NFD_ADDR=$(cat /etc/nfd-config/ADDRESS)
              export NDN_CLIENT_TRANSPORT="tcp4://${NFD_ADDR}"
              echo "Connecting to NFD at ${NDN_CLIENT_TRANSPORT}..."
              ndnseed -v --namespace ndn /${NODE_NAME}/seed/
          volumeMounts:
            - name: nfd-config
              mountPath: /etc/nfd-config
      volumes:
        - name: nfd-config
          configMap:
            name: nfd-config
            optional: false

apiVersion: v1
kind: ServiceAccount
metadata:
  name: manager-service-account
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-node-reader
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: manager-node-reader-binding
subjects:
- kind: ServiceAccount
  name: manager-service-account
  namespace: default
roleRef:
  kind: ClusterRole
  name: manager-node-reader
  apiGroup: rbac.authorization.k8s.io